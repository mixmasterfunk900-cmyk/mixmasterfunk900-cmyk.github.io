<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chess Uploader — TikTok Authorization</title>
<style>
  body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
         background:#0f1115; color:#e8e8ea; margin:0; padding:2rem 1rem;
         display:flex; justify-content:center; }
  .card { max-width:640px; width:100%; background:#181b22; border:1px solid #2a2e38;
          border-radius:12px; padding:2rem; }
  h1 { font-size:1.4rem; margin:0 0 .5rem; }
  p  { color:#a8adb8; line-height:1.5; }
  .label { font-size:.8rem; text-transform:uppercase; letter-spacing:.08em;
           color:#8a90a0; margin:1.2rem 0 .3rem; }
  .box { display:flex; gap:.5rem; align-items:stretch; }
  .val { flex:1; font-family:Consolas, Menlo, monospace; font-size:.95rem;
         background:#0d0f13; border:1px solid #2a2e38; border-radius:8px;
         padding:.7rem .8rem; word-break:break-all; user-select:all; }
  button { background:#2f6fed; color:#fff; border:0; border-radius:8px;
           padding:0 1rem; font-size:.9rem; cursor:pointer; }
  button:active { background:#2559c4; }
  .err { color:#ff6b6b; font-family:Consolas, Menlo, monospace; word-break:break-all; }
  .ok  { color:#5dd39e; }
  footer { margin-top:1.5rem; font-size:.8rem; color:#666c78; }
</style>
</head>
<body>
<div class="card">
  <h1>Chess Uploader — TikTok Authorization</h1>
  <div id="content"><p>Reading authorization response…</p></div>
  <footer>Chess Uploader · <a href="/" style="color:#8a90a0">Home</a></footer>
</div>
<script>
(function () {
  var q = new URLSearchParams(location.search);
  var el = document.getElementById('content');
  function row(label, value, id) {
    return '<div class="label">' + label + '</div>' +
           '<div class="box"><div class="val" id="' + id + '">' + value + '</div>' +
           '<button onclick="copyVal(\'' + id + '\', this)">Copy</button></div>';
  }
  window.copyVal = function (id, btn) {
    var t = document.getElementById(id).textContent;
    navigator.clipboard.writeText(t).then(function () {
      btn.textContent = 'Copied!';
      setTimeout(function () { btn.textContent = 'Copy'; }, 1500);
    });
  };
  function manualFallback(code, state, note) {
    el.innerHTML = '<p class="ok">✓ TikTok authorization successful.</p>' +
                   (note ? '<p class="err">' + note + '</p>' : '') +
                   row('Authorization code', code, 'code') +
                   (state ? row('State', state, 'state') : '') +
                   '<p>Copy the authorization code and paste it into the VPS token-exchange step.</p>';
  }
  if (q.get('error')) {
    el.innerHTML = '<p class="err">Error: ' + q.get('error') + '<br>' +
                   (q.get('error_description') || '') + '</p>';
    return;
  }
  var code = q.get('code');
  if (!code) {
    el.innerHTML = '<p>No authorization response found. Start the login from the app.</p>';
    return;
  }
  // Auto mode: hand the code straight to the app server and upload a clip.
  el.innerHTML = '<p class="ok">✓ TikTok authorization successful.</p>' +
                 '<p id="stage">Connecting to Chess Uploader…</p>';
  var stage = function (t) { document.getElementById('stage').innerHTML = t; };
  fetch('/tunnel.json?ts=' + Date.now())
    .then(function (r) { if (!r.ok) throw new Error('no tunnel'); return r.json(); })
    .then(function (t) {
      stage('⏳ Connecting your TikTok account and uploading a chess clip…<br>' +
            '<span style="color:#8a90a0">(takes about a minute — leave this page open)</span>');
      return fetch(t.url + '/exchange', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code })
      });
    })
    .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
    .then(function (res) {
      if (res.ok && res.j.ok) {
        stage('<span class="ok" style="font-size:1.2rem">✓ Done! Your chess clip was uploaded to TikTok.</span><br><br>' +
              'Open the TikTok app on your phone — the draft is waiting in your inbox.');
      } else {
        manualFallback(code, q.get('state'),
          'Automatic upload failed — use the manual step below.');
      }
    })
    .catch(function () {
      manualFallback(code, q.get('state'),
        'Could not reach the app server — use the manual step below.');
    });
})();
</script>
</body>
</html>
